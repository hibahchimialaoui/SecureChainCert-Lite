<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChainCert Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-12 flex flex-col items-center">
            <h1 class="text-4xl font-bold text-indigo-400 mb-2">🔐 SecureChainCert Lite</h1>
            <p class="text-gray-400 mb-4">Sécurisation et vérification authentique de certificats via la Blockchain</p>
            
            <div class="flex flex-col items-center gap-2">
                <button id="connectWalletBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-300">
                    🔌 Connecter MetaMask
                </button>
                <button id="disconnectWalletBtn" class="hidden bg-rose-600 hover:bg-rose-700 text-white text-xs font-semibold py-1.5 px-4 rounded-md shadow transition duration-300">
                    🔌 Déconnecter le portefeuille
                </button>
            </div>
            
            <div id="walletAddress" class="text-green-400 mt-4 hidden bg-slate-800 border border-slate-700 py-2 px-6 rounded-xl shadow-inner text-center"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700">
                <h2 class="text-2xl font-semibold text-indigo-300 mb-4 flex items-center gap-2">✍️ Émettre un Certificat</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Nom de l'Étudiant</label>
                        <input type="text" id="studentName" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: Hiba">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Filière / Formation</label>
                        <input type="text" id="courseName" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: Cybersecurity">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Année d'Obtention</label>
                        <input type="text" id="issueDate" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: 2026">
                    </div>
                    <button id="addCertBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                        Enregistrer sur la Blockchain
                    </button>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 flex flex-col justify-between">
                <div>
                    <h2 class="text-2xl font-semibold text-indigo-300 mb-4 flex items-center gap-2">🔍 Vérifier un Certificat</h2>
                    <p class="text-sm text-gray-400 mb-4">Entrez les détails exacts du document pour recalculer son empreinte et interroger la Blockchain.</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Nom de l'Étudiant</label>
                            <input type="text" id="vStudentName" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: Hiba">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Filière / Formation</label>
                            <input type="text" id="vCourseName" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: Cybersecurity">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Année d'Obtention</label>
                            <input type="text" id="vIssueDate" class="w-full bg-slate-700 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: 2026">
                        </div>
                        <button id="verifyCertBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                            Vérifier l'Authenticité
                        </button>
                    </div>
                </div>

                <div id="resultBox" class="mt-6 p-4 rounded-lg border text-center font-semibold hidden"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
